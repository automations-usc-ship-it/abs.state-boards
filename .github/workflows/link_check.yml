name: State Bar Link Check
on:
  schedule:
    - cron: '0 14,17,20,23,2 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run link checker
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.ABS_ALERTS_GMAIL_APP_PASSWORD }}
        run: python check_links.py

      - name: Commit updated results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/results.json
          git diff --cached --quiet || git commit -m "chore: link scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
